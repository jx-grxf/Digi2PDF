name: Build Binaries

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install $env:PYTHON_VERSION
      - run: uv sync --dev --frozen
      - run: uv run ruff check .
      - run: uv run pytest
      - name: Build digi2pdf.exe
        run: >-
          uv run pyinstaller
          --clean
          --noconfirm
          --onefile
          --name digi2pdf
          --collect-all keyring
          --collect-all PIL
          --collect-all platformdirs
          --collect-all questionary
          --collect-all rich
          --collect-all selenium
          packaging/digi2pdf_entry.py
      - name: Smoke test EXE
        run: .\dist\digi2pdf.exe --version
      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if (-not $version) {
            $version = "manual-${{ github.run_number }}"
          }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $assetName = "digi2pdf-$version-windows-x64.exe"
          $assetPath = "release-assets/$assetName"
          Copy-Item dist/digi2pdf.exe $assetPath
          $hash = Get-FileHash $assetPath -Algorithm SHA256
          "$($hash.Hash.ToLower())  $assetName" | Set-Content -Encoding ascii "$assetPath.sha256"
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$assetPath.sha256" >> $env:GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: digi2pdf-windows-x64
          path: release-assets/*
          if-no-files-found: error
      - name: Upload EXE to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          "${{ steps.assets.outputs.asset_path }}"
          "${{ steps.assets.outputs.checksum_path }}"
          --clobber
