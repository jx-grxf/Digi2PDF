name: Build Binaries

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS App
    runs-on: macos-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --dev --frozen
      - run: uv run ruff check .
      - run: uv run pytest
      - name: Install DMG tooling
        run: brew install create-dmg
      - name: Build Digi2PDF.app
        id: build
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="manual-${{ github.run_number }}"
          fi
          ASSET_PATH="$(./scripts/build_macos_app.sh "$VERSION" | tail -n 1)"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$ASSET_PATH.sha256" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(basename "$ASSET_PATH")" >> "$GITHUB_OUTPUT"
          echo "checksum_name=$(basename "$ASSET_PATH").sha256" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: digi2pdf-macos-app
          path: release-assets/*
          if-no-files-found: error
      - name: Upload macOS app to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          "${{ steps.build.outputs.asset_path }}"
          "${{ steps.build.outputs.checksum_path }}"
          --clobber
      - name: Wait for macOS release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          expected=(
            "${{ steps.build.outputs.asset_name }}"
            "${{ steps.build.outputs.checksum_name }}"
          )

          for attempt in {1..12}; do
            asset_names="$(gh release view "$tag" --json assets --jq '.assets[].name')"
            missing=()
            for name in "${expected[@]}"; do
              if ! grep -Fxq "$name" <<<"$asset_names"; then
                missing+=("$name")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              echo "Release assets are visible: ${expected[*]}"
              exit 0
            fi

            echo "Waiting for release assets: ${missing[*]}"
            sleep 5
          done

          echo "Release assets did not become visible in time." >&2
          exit 1

  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install $env:PYTHON_VERSION
      - run: uv sync --dev --frozen
      - run: uv run ruff check .
      - run: uv run pytest
      - name: Build digi2pdf.exe
        run: >-
          uv run pyinstaller
          --clean
          --noconfirm
          --onefile
          --name digi2pdf
          --collect-all keyring
          --collect-all ocrmypdf
          --collect-all PIL
          --collect-all pypdfium2
          --collect-all platformdirs
          --collect-all questionary
          --collect-all rich
          --collect-all selenium
          packaging/digi2pdf_entry.py
      - name: Smoke test EXE
        run: .\dist\digi2pdf.exe --version
      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if (-not $version) {
            $version = "manual-${{ github.run_number }}"
          }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $assetName = "digi2pdf-$version-windows-x64.exe"
          $assetPath = "release-assets/$assetName"
          Copy-Item dist/digi2pdf.exe $assetPath
          $hash = Get-FileHash $assetPath -Algorithm SHA256
          "$($hash.Hash.ToLower())  $assetName" | Set-Content -Encoding ascii "$assetPath.sha256"
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$assetPath.sha256" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "checksum_name=$assetName.sha256" >> $env:GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: digi2pdf-windows-x64
          path: release-assets/*
          if-no-files-found: error
      - name: Upload EXE to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          "${{ steps.assets.outputs.asset_path }}"
          "${{ steps.assets.outputs.checksum_path }}"
          --clobber
      - name: Wait for release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $expected = @(
            "${{ steps.assets.outputs.asset_name }}",
            "${{ steps.assets.outputs.checksum_name }}"
          )

          for ($attempt = 1; $attempt -le 12; $attempt++) {
            $release = gh release view $tag --json assets | ConvertFrom-Json
            $assetNames = @($release.assets | ForEach-Object { $_.name })
            $missing = @($expected | Where-Object { $assetNames -notcontains $_ })

            if ($missing.Count -eq 0) {
              Write-Host "Release assets are visible: $($expected -join ', ')"
              exit 0
            }

            Write-Host "Waiting for release assets: $($missing -join ', ')"
            Start-Sleep -Seconds 5
          }

          Write-Error "Release assets did not become visible in time."
          exit 1

  trigger-website-rebuild:
    name: Trigger website rebuild
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [macos-app, windows-exe]
    steps:
      - name: Trigger website rebuild after all binaries
        env:
          WEBSITE_DEPLOY_HOOK_URL: ${{ secrets.WEBSITE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$WEBSITE_DEPLOY_HOOK_URL" ]; then
            echo "WEBSITE_DEPLOY_HOOK_URL secret is missing; skipping website rebuild."
            exit 0
          fi

          curl -fsS -X POST "$WEBSITE_DEPLOY_HOOK_URL" >/dev/null
